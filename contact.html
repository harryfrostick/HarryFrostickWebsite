<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Get in Touch — Harry Frostick</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --fg: #0f0f0f;
      --accent: #e54e77;
      --muted: #7a6065;
      --line: rgba(15,15,15,0.1);
    }

    html { font-size: 16px; }

    body {
      background: linear-gradient(to bottom, #fce8ec 0%, #f4b8c4 100%);
      background-attachment: fixed;
      color: var(--fg);
      font-family: 'Montserrat', sans-serif;
      font-weight: 300;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      cursor: none;
    }

    /* Grain */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9990;
      opacity: 0.45;
    }

    /* Cursor */

    /* Nav */
    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; padding: 2rem 3rem; }
    nav::before { content: ''; position: fixed; top: 0; left: 0; right: 0; height: 80px; background: linear-gradient(to bottom, rgba(28,3,21,0.35) 0%, transparent 100%); z-index: -1; pointer-events: none; }
    .nav-links { display: flex; gap: 2.5rem; list-style: none; }
    .nav-links a { color: var(--fg); text-decoration: none; font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase; opacity: 0.5; transition: opacity 0.3s; mix-blend-mode: difference; }
    .nav-links a:hover { opacity: 1; }

    /* Main */
    main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 8rem 3rem 6rem; }

    .contact-wrap {
      width: 100%;
      max-width: 580px;
      opacity: 0;
      transform: translateY(30px);
      animation: fadeUp 0.8s ease 0.2s forwards;
    }

    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

    .eyebrow { font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); margin-bottom: 1.2rem; }

    .contact-heading {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3.5rem, 9vw, 8rem);
      line-height: 0.88;
      margin-bottom: 3rem;
    }

    .form-group { margin-bottom: 2rem; }

    label {
      display: block;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.7rem;
    }

    input, textarea {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--line);
      color: var(--fg);
      font-family: 'Montserrat', sans-serif;
      font-weight: 300;
      font-size: 0.88rem;
      padding: 0.7rem 0;
      outline: none;
      transition: border-color 0.3s;
      caret-color: var(--accent);
    }
    input:focus, textarea:focus { border-bottom-color: var(--accent); }
    input::placeholder, textarea::placeholder { color: rgba(15,15,15,0.3); }
    textarea { resize: none; height: 110px; }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; }

    .submit-btn {
      margin-top: 2.5rem;
      display: inline-flex;
      align-items: center;
      gap: 0.8rem;
      background: transparent;
      border: 1px solid var(--line);
      color: var(--fg);
      font-family: 'Montserrat', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 0.9rem 1.6rem;
      cursor: none;
      transition: border-color 0.3s, color 0.3s, gap 0.3s;
    }
    .submit-btn:hover { border-color: var(--accent); color: var(--accent); gap: 1.3rem; }
    .submit-btn svg { transition: transform 0.3s; }
    .submit-btn:hover svg { transform: translateX(4px); }

    /* Success */
    .success-msg { display: none; text-align: center; padding: 3rem 0; }
    .success-msg .tick { width: 44px; height: 44px; border: 1px solid var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; }
    .success-msg h2 { font-family: 'Bebas Neue', sans-serif; font-size: 2.5rem; margin-bottom: 0.5rem; }
    .success-msg p { color: rgba(15,15,15,0.5); font-size: 0.88rem; }
    .success-msg a { display: inline-block; margin-top: 2rem; color: var(--accent); text-decoration: none; font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase; }

    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--muted); }

    @media (max-width: 600px) {
      nav { padding: 1.5rem; }
      .nav-links { display: none; }
      main { padding: 6rem 1.5rem 4rem; }
      .form-row { grid-template-columns: 1fr; gap: 0; }
    }
    /* Nav logo */
    .nav-logo { display: flex; align-items: center; text-decoration: none; opacity: 0.9; transition: opacity 0.3s; }
    .nav-logo:hover { opacity: 1; }
    .nav-logo-lottie { width: 41px; height: 55px; display: block; }
    .cursor { position: fixed; width: 8.8px; height: 8.8px; background: #ffffff; border-radius: 50%; pointer-events: none; z-index: 9999; transform: translate(-50%,-50%); mix-blend-mode: multiply; }
    .cursor-echo { position: fixed; border-radius: 50%; pointer-events: none; z-index: 9998; transform: translate(-50%,-50%); }
  </style>
</head>
<body>

  <div class="cursor" id="cursor"></div>

  <nav>
        <a href="index.html" class="nav-logo" id="navLogo">
      <div class="nav-logo-lottie" id="navLottie"></div>
    </a>
    <ul class="nav-links">
      <li><a href="about.html">About</a></li>
      <li><a href="portfolio.html">Work</a></li>
      <li><a href="https://www.instagram.com/harryfrostickdesigns" target="_blank" rel="noopener">Instagram</a></li>
      <li><a href="contact.html">Get in touch</a></li>
    </ul>
  </nav>

  <main>
    <div class="contact-wrap">
      <div id="formContainer">
        <p class="eyebrow">Let's work together</p>
        <h1 class="contact-heading">Get in<br>touch.</h1>
        <form id="contactForm" action="https://api.web3forms.com/submit" method="POST">
          <input type="hidden" name="access_key" value="ebcdb7b8-2401-4f70-94f8-31f23f01d6f4" />
          <input type="hidden" name="subject" value="New message from harryfrostick.com" />
          <input type="hidden" name="redirect" value="false" />
          <div class="form-row">
            <div class="form-group">
              <label for="name">Name</label>
              <input type="text" id="name" name="name" placeholder="Your name" required />
            </div>
            <div class="form-group">
              <label for="email">Email</label>
              <input type="email" id="email" name="email" placeholder="your@email.com" required />
            </div>
          </div>
          <div class="form-group">
            <label for="subject">Subject</label>
            <input type="text" id="subject" name="subject" placeholder="What's this about?" />
          </div>
          <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" name="message" placeholder="Tell me about your project..." required></textarea>
          </div>
          <button type="submit" class="submit-btn">
            Send message
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
              <path d="M2 7h10M7 2l5 5-5 5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </form>
      </div>
      <div class="success-msg" id="successMsg">
        <div class="tick">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <path d="M3 9l4 4 8-8" stroke="#e54e77" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <h2>Message sent.</h2>
        <p>Thanks for getting in touch — I'll get back to you soon.</p>
        <a href="index.html">← Back to site</a>
      </div>
    </div>
  </main>

  <script>
    const cursor = document.getElementById('cursor');

    const TRAIL_COUNT = 150;
    const echoes = [];
    for (let i = 0; i < TRAIL_COUNT; i++) {
      const el = document.createElement('div');
      el.className = 'cursor-echo';
      document.body.appendChild(el);
      echoes.push({ el, x: 0, y: 0 });
    }

    let mouseX = 0, mouseY = 0;
    let prevX = 0, prevY = 0;
    let speed = 0;

    document.addEventListener('mousemove', e => {
      mouseX = e.clientX;
      mouseY = e.clientY;
      cursor.style.left = mouseX + 'px';
      cursor.style.top  = mouseY + 'px';
    });

    (function tick() {
      const dx = mouseX - prevX;
      const dy = mouseY - prevY;
      speed = Math.sqrt(dx * dx + dy * dy);
      prevX = mouseX;
      prevY = mouseY;

      // How many echoes are active — scales with speed, min 1, max TRAIL_COUNT
      const activeCount = Math.min(TRAIL_COUNT, Math.max(1, Math.floor(speed * 4.5)));

      for (let i = 0; i < TRAIL_COUNT; i++) {
        const echo = echoes[i];
        const lag = (i + 1) * 0.003;
        echo.x += (mouseX - echo.x) * (1 - lag);
        echo.y += (mouseY - echo.y) * (1 - lag);

        if (i < activeCount) {
          // Progress 0 (closest to cursor) → 1 (tail end)
          const t = i / (activeCount - 1 || 1);
          const size = 8.8 * (1 - t * 0.1);           // shrinks toward tail
          const opacity = 0.55 * (1 - t);             // fades toward tail

          echo.el.style.display = 'block';
          echo.el.style.width  = size + 'px';
          echo.el.style.height = size + 'px';
          echo.el.style.left   = echo.x + 'px';
          echo.el.style.top    = echo.y + 'px';
          echo.el.style.opacity = opacity;
          echo.el.style.background = '#ffffff';
        } else {
          echo.el.style.display = 'none';
        }
      }

      requestAnimationFrame(tick);
    })();

    document.querySelectorAll('a,button').forEach(el => {
      el.addEventListener('mouseenter', () => { cursor.style.width='20px'; cursor.style.height='20px'; ring.style.width='60px'; ring.style.height='60px'; });
      el.addEventListener('mouseleave', () => { cursor.style.width='10px'; cursor.style.height='10px'; ring.style.width='36px'; ring.style.height='36px'; });
    });
    const form = document.getElementById('contactForm');
    form.addEventListener('submit', async e => {
      e.preventDefault();
      const btn = form.querySelector('.submit-btn');
      btn.textContent = 'Sending…';
      btn.disabled = true;
      const res = await fetch(form.action, { method: 'POST', body: new FormData(form), headers: { 'Accept': 'application/json' } });
      if (res.ok) {
        document.getElementById('formContainer').style.display = 'none';
        document.getElementById('successMsg').style.display = 'block';
      } else {
        btn.textContent = 'Something went wrong — try again';
        btn.disabled = false;
      }
    });
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.12.2/lottie.min.js"></script>
  <script>
    (function() {
      var logo = document.getElementById('navLogo');
      var container = document.getElementById('navLottie');
      var anim = lottie.loadAnimation({
        container: container,
        renderer: 'svg',
        loop: true,
        autoplay: false,
        path: 'HF_Ident.json'
      });
      anim.addEventListener('DOMLoaded', function() {
        anim.goToAndStop(0, true);
      });
      logo.addEventListener('mouseenter', function() {
        anim.goToAndPlay(0, true);
      });
      logo.addEventListener('mouseleave', function() {
        anim.goToAndStop(0, true);
      });
    })();
  </script>
</body>
</html>

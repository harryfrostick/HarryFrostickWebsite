    .page { padding: 11rem 3rem 8rem; max-width: 1400px; margin: 0 auto; }

    /* Hero */

  <script>

    const cursor = document.getElementById('cursor');

    const TRAIL_COUNT = 90;
    const echoes = [];
    for (let i = 0; i < TRAIL_COUNT; i++) {
      const el = document.createElement('div');
      el.className = 'cursor-echo';
      document.body.appendChild(el);
      echoes.push({ el, x: 0, y: 0 });
    }

    let mouseX = 0, mouseY = 0;
    let prevX = 0, prevY = 0;
    let speed = 0;

    document.addEventListener('mousemove', e => {
      mouseX = e.clientX;
      mouseY = e.clientY;
      cursor.style.left = mouseX + 'px';
      cursor.style.top  = mouseY + 'px';
    });

    (function tick() {
      const dx = mouseX - prevX;
      const dy = mouseY - prevY;
      speed = Math.sqrt(dx * dx + dy * dy);
      prevX = mouseX;
      prevY = mouseY;

      const activeCount = Math.min(TRAIL_COUNT, Math.max(1, Math.floor(speed * 3.0)));

      for (let i = 0; i < TRAIL_COUNT; i++) {
        const echo = echoes[i];
        const lag = (i + 1) * 0.007;
        echo.x += (mouseX - echo.x) * (1 - lag);
        echo.y += (mouseY - echo.y) * (1 - lag);

        if (i < activeCount) {
          const t = i / (activeCount - 1 || 1);
          const size = 12.7 * (1 - t * 0.1);
          const opacity = 0.55 * (1 - t);

          echo.el.style.display = 'block';
          echo.el.style.width  = size + 'px';
          echo.el.style.height = size + 'px';
          echo.el.style.left   = echo.x + 'px';
          echo.el.style.top    = echo.y + 'px';
          echo.el.style.opacity = opacity;
          echo.el.style.background = '#ffffff';
        } else {
          echo.el.style.display = 'none';
        }
      }

      requestAnimationFrame(tick);
    })();


    // Nav scrolled state
    window.addEventListener('scroll', () => {
      document.querySelector('nav').classList.toggle('scrolled', window.scrollY > 60);
    });


    // Hamburger menu
    const hamburger = document.getElementById('navHamburger');
    const mobileMenu = document.getElementById('mobileMenu');
    if (hamburger && mobileMenu) {
      hamburger.addEventListener('click', () => {
        hamburger.classList.toggle('open');
        mobileMenu.classList.toggle('open');
      });
      mobileMenu.querySelectorAll('a').forEach(a => {
        a.addEventListener('click', () => {
          hamburger.classList.remove('open');
          mobileMenu.classList.remove('open');
        });
      });
      const mobileClose = document.getElementById('mobileClose');
      if (mobileClose) {
        mobileClose.addEventListener('click', () => {
          hamburger.classList.remove('open');
          mobileMenu.classList.remove('open');
        });
      }
    }

    // Nav magnetic float + cursor scale
    (function() {
      const navLinks = document.querySelectorAll('.nav-links a');

      const animateit = function(e) {
        const span = this.querySelector('span');
        if (!span) return;
        const { offsetX: x, offsetY: y } = e,
              { offsetWidth: w, offsetHeight: h } = this,
              move = 4,
              xMove = x / w * (move * 2) - move,
              yMove = y / h * (move * 2) - move;
        span.style.transform = 'translate(' + xMove + 'px, ' + yMove + 'px)';
        if (e.type === 'mouseleave') span.style.transform = '';
      };

      navLinks.forEach(a => {
        // Wrap text in span if not already
        if (!a.querySelector('span')) {
          a.innerHTML = '<span>' + a.innerHTML + '</span>';
        }
        a.addEventListener('mousemove', animateit);
        a.addEventListener('mouseleave', animateit);
        a.addEventListener('mouseenter', () => {
          cursor.style.transform = 'translate(-50%,-50%) scale(4.5)';
          cursor.style.mixBlendMode = 'difference';
          cursor.style.transition = 'transform 0.3s ease';
        });
        a.addEventListener('mouseleave', () => {
          cursor.style.transform = 'translate(-50%,-50%) scale(1)';
          cursor.style.mixBlendMode = 'multiply';
          cursor.style.transition = 'transform 0.3s ease';
        });
      });
    })();

    document.querySelectorAll('a,button').forEach(el => {
      el.addEventListener('mouseenter', () => {});
      el.addEventListener('mouseleave', () => {});
    });
    const form = document.getElementById('contactForm');
    form.addEventListener('submit', async e => {
      e.preventDefault();
      const btn = form.querySelector('.submit-btn');
      btn.textContent = 'Sending…';
      btn.disabled = true;
      const res = await fetch(form.action, { method: 'POST', body: new FormData(form), headers: { 'Accept': 'application/json' } });
      if (res.ok) {
        document.getElementById('formContainer').style.display = 'none';
        document.getElementById('successMsg').style.display = 'block';
      } else {
        btn.textContent = 'Something went wrong — try again';
        btn.disabled = false;
      }
    });

    // ── Proximity nav ──────────────────────────────────────────────
    (function() {
      const proxLinks  = document.getElementById('proxLinks');
      const proxBurger = document.getElementById('proxBurger');
      const PROX_X = 320;
      const PROX_Y = 100;
      let isExpanded = false;
      let collapseTimer = null;

      function expand() {
        if (isExpanded) return;
        isExpanded = true;
        clearTimeout(collapseTimer);
        proxLinks.classList.add('expanded');
        proxBurger.classList.add('open');
      }
      function collapse() {
        collapseTimer = setTimeout(() => {
          isExpanded = false;
          proxLinks.classList.remove('expanded');
          proxBurger.classList.remove('open');
        }, 180);
      }
      document.addEventListener('mousemove', e => {
        const fromRight = window.innerWidth - e.clientX;
        const fromTop   = e.clientY;
        if (fromRight < PROX_X && fromTop < PROX_Y) {
          clearTimeout(collapseTimer);
          expand();
        } else if (isExpanded) {
          const navEl = document.getElementById('mainNav');
          const rect  = navEl.getBoundingClientRect();
          const overNav = e.clientX >= rect.left && e.clientX <= rect.right &&
                          e.clientY >= rect.top  && e.clientY <= rect.bottom;
          if (!overNav) collapse();
          else clearTimeout(collapseTimer);
        }
      });
      document.getElementById('mainNav').addEventListener('mouseleave', () => {
        if (isExpanded) collapse();
      });
      const proxAnchors = document.querySelectorAll('.prox-links a');
      proxAnchors.forEach(a => {
        if (!a.querySelector('span')) {
          a.innerHTML = '<span>' + a.innerHTML + '</span>';
        }
        const animateit = function(e) {
          const span = this.querySelector('span');
          if (!span) return;
          const { offsetX: x, offsetY: y } = e,
                { offsetWidth: w, offsetHeight: h } = this,
                move = 4,
                xMove = x / w * (move * 2) - move,
                yMove = y / h * (move * 2) - move;
          span.style.transform = 'translate(' + xMove + 'px, ' + yMove + 'px)';
          if (e.type === 'mouseleave') span.style.transform = '';
        };
        a.addEventListener('mousemove', animateit);
        a.addEventListener('mouseleave', animateit);
        a.addEventListener('mouseenter', () => {
          cursor.style.transform = 'translate(-50%,-50%) scale(4.5)';
          cursor.style.mixBlendMode = 'difference';
          cursor.style.transition = 'transform 0.3s ease';
        });
        a.addEventListener('mouseleave', () => {
          cursor.style.transform = 'translate(-50%,-50%) scale(1)';
          cursor.style.mixBlendMode = 'multiply';
          cursor.style.transition = 'transform 0.3s ease';
        });
      });
    })();

    document.querySelectorAll('a,button').forEach(el => {
      el.addEventListener('mouseenter', () => {});
      el.addEventListener('mouseleave', () => {});
    });

  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.12.2/lottie.min.js"></script>
  <script>
    (function() {
      var logo = document.getElementById('navLogo');
      var container = document.getElementById('navLottie');
      var anim = lottie.loadAnimation({
        container: container,
        renderer: 'svg',
        loop: true,
        autoplay: false,
        path: 'Assets/HF_Ident.json'
      });
      anim.addEventListener('DOMLoaded', function() {
        anim.goToAndStop(0, true);
      });
      logo.addEventListener('mouseenter', function() {
        anim.goToAndPlay(0, true);
      });
      logo.addEventListener('mouseleave', function() {
        anim.goToAndStop(0, true);
      });
    })();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Get in Touch — Harry Frostick</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --fg: #f0ebe3;
      --accent: #e8d5b0;
      --muted: #6b6560;
      --line: rgba(240,235,227,0.1);
    }

    html { font-size: 16px; }

    body {
      background: #0c0c0c;
      color: var(--fg);
      font-family: 'Manrope', sans-serif;
      font-weight: 300;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      cursor: none;
    }

    /* Cursor */
    .cursor {
      position: fixed;
      width: 10px; height: 10px;
      background: var(--fg);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: width 0.3s, height 0.3s;
      mix-blend-mode: difference;
    }
    .cursor-ring {
      position: fixed;
      width: 36px; height: 36px;
      border: 1px solid rgba(240,235,227,0.5);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9998;
      transform: translate(-50%, -50%);
      transition: width 0.3s, height 0.3s;
    }

    /* Grain */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9990;
      opacity: 0.4;
    }

    /* Orbs */
    .bg-orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      pointer-events: none;
      animation: orbFloat 12s ease-in-out infinite;
    }
    .bg-orb-1 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(180,140,80,0.1), transparent 70%);
      top: -80px; right: -80px;
    }
    .bg-orb-2 {
      width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(100,80,60,0.08), transparent 70%);
      bottom: 80px; left: -40px;
      animation-delay: -5s;
    }
    @keyframes orbFloat {
      0%, 100% { transform: translate(0,0); }
      33% { transform: translate(20px,-15px); }
      66% { transform: translate(-15px,10px); }
    }

    /* Nav */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 2rem 3rem;
    }
    nav::after {
      content: '';
      position: absolute;
      bottom: 0; left: 3rem; right: 3rem;
      height: 1px;
      background: var(--line);
    }
    .nav-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.3rem;
      letter-spacing: 0.12em;
      color: var(--fg);
      text-decoration: none;
      opacity: 0.85;
    }
    .nav-back {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      color: var(--muted);
      text-decoration: none;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      transition: color 0.3s, gap 0.3s;
    }
    .nav-back:hover { color: var(--fg); gap: 0.9rem; }
    .nav-back svg { transform: rotate(180deg); transition: transform 0.3s; }

    /* Main */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8rem 3rem 4rem;
    }

    .contact-wrap {
      width: 100%;
      max-width: 640px;
      opacity: 0;
      transform: translateY(30px);
      animation: fadeUp 0.8s ease 0.2s forwards;
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    .contact-eyebrow {
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1rem;
    }

    .contact-heading {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3rem, 8vw, 7rem);
      line-height: 0.9;
      margin-bottom: 2.5rem;
    }

    /* Form */
    .form-group {
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      font-size: 0.72rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.6rem;
    }

    input, textarea {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--line);
      color: var(--fg);
      font-family: 'Manrope', sans-serif;
      font-weight: 300;
      font-size: 1rem;
      padding: 0.75rem 0;
      outline: none;
      transition: border-color 0.3s;
      caret-color: var(--accent);
    }
    input:focus, textarea:focus {
      border-bottom-color: var(--accent);
    }
    input::placeholder, textarea::placeholder {
      color: rgba(240,235,227,0.2);
    }
    textarea {
      resize: none;
      height: 120px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
    }

    .submit-btn {
      margin-top: 2.5rem;
      display: inline-flex;
      align-items: center;
      gap: 0.8rem;
      background: transparent;
      border: 1px solid var(--line);
      color: var(--fg);
      font-family: 'Manrope', sans-serif;
      font-size: 0.8rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 1rem 2rem;
      cursor: none;
      transition: background 0.3s, border-color 0.3s, gap 0.3s;
    }
    .submit-btn:hover {
      background: rgba(240,235,227,0.06);
      border-color: rgba(240,235,227,0.3);
      gap: 1.3rem;
    }
    .submit-btn svg { transition: transform 0.3s; }
    .submit-btn:hover svg { transform: translateX(4px); }

    /* Success state */
    .success-msg {
      display: none;
      text-align: center;
      padding: 3rem 0;
    }
    .success-msg .tick {
      width: 48px; height: 48px;
      border: 1px solid var(--accent);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
    }
    .success-msg h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 3rem;
      margin-bottom: 0.5rem;
    }
    .success-msg p {
      color: rgba(240,235,227,0.6);
      font-size: 0.9rem;
    }
    .success-msg a {
      display: inline-block;
      margin-top: 2rem;
      color: var(--accent);
      text-decoration: none;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      border-bottom: 1px solid var(--line);
      padding-bottom: 2px;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #0a0a0a; }
    ::-webkit-scrollbar-thumb { background: var(--muted); }

    @media (max-width: 600px) {
      nav { padding: 1.5rem; }
      nav::after { left: 1.5rem; right: 1.5rem; }
      main { padding: 6rem 1.5rem 3rem; }
      .form-row { grid-template-columns: 1fr; gap: 0; }
    }
  </style>
</head>
<body>

  <div class="cursor" id="cursor"></div>
  <div class="cursor-ring" id="cursorRing"></div>
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>

  <nav>
    <a href="index.html" class="nav-logo">HF</a>
    <a href="index.html" class="nav-back">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Back
    </a>
  </nav>

  <main>
    <div class="contact-wrap">

      <div id="formContainer">
        <p class="contact-eyebrow">Let's work together</p>
        <h1 class="contact-heading">Get in<br>touch.</h1>

        <form id="contactForm" action="https://api.web3forms.com/submit" method="POST">
          <input type="hidden" name="access_key" value="ebcdb7b8-2401-4f70-94f8-31f23f01d6f4" />
          <input type="hidden" name="subject" value="New message from harryfrostick.com" />
          <input type="hidden" name="redirect" value="false" />

          <div class="form-row">
            <div class="form-group">
              <label for="name">Name</label>
              <input type="text" id="name" name="name" placeholder="Your name" required />
            </div>
            <div class="form-group">
              <label for="email">Email</label>
              <input type="email" id="email" name="email" placeholder="your@email.com" required />
            </div>
          </div>

          <div class="form-group">
            <label for="subject">Subject</label>
            <input type="text" id="subject" name="subject" placeholder="What's this about?" />
          </div>

          <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" name="message" placeholder="Tell me about your project..." required></textarea>
          </div>

          <button type="submit" class="submit-btn">
            Send message
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </form>
      </div>

      <div class="success-msg" id="successMsg">
        <div class="tick">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <path d="M4 10l4 4 8-8" stroke="#e8d5b0" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <h2>Message sent.</h2>
        <p>Thanks for getting in touch — I'll get back to you soon.</p>
        <a href="index.html">← Back to site</a>
      </div>

    </div>
  </main>

  <script>
    // Cursor
    const cursor = document.getElementById('cursor');
    const ring = document.getElementById('cursorRing');
    let mouseX = 0, mouseY = 0, ringX = 0, ringY = 0;
    document.addEventListener('mousemove', (e) => {
      mouseX = e.clientX; mouseY = e.clientY;
      cursor.style.left = mouseX + 'px';
      cursor.style.top = mouseY + 'px';
    });
    function animateRing() {
      ringX += (mouseX - ringX) * 0.12;
      ringY += (mouseY - ringY) * 0.12;
      ring.style.left = ringX + 'px';
      ring.style.top = ringY + 'px';
      requestAnimationFrame(animateRing);
    }
    animateRing();
    document.querySelectorAll('a, button').forEach(el => {
      el.addEventListener('mouseenter', () => { cursor.style.width = '20px'; cursor.style.height = '20px'; ring.style.width = '60px'; ring.style.height = '60px'; });
      el.addEventListener('mouseleave', () => { cursor.style.width = '10px'; cursor.style.height = '10px'; ring.style.width = '36px'; ring.style.height = '36px'; });
    });

    // Form submission
    const form = document.getElementById('contactForm');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = form.querySelector('.submit-btn');
      btn.textContent = 'Sending…';
      btn.disabled = true;

      const data = new FormData(form);
      const response = await fetch(form.action, {
        method: 'POST',
        body: data,
        headers: { 'Accept': 'application/json' }
      });

      if (response.ok) {
        document.getElementById('formContainer').style.display = 'none';
        document.getElementById('successMsg').style.display = 'block';
      } else {
        btn.textContent = 'Something went wrong — try again';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --fg:        #f0ebe3;

    body {

    /* Grain */

      z-index: 9990;
      opacity: 0.45;

    /* Nav */
    nav {

      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 2rem 3rem;

    .nav-links {

      color: var(--fg);
      text-decoration: none;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      opacity: 0.5;
      transition: opacity 0.3s;
      mix-blend-mode: difference;
    }
    .nav-links a:hover { opacity: 1; }



    /* Ticker */
    .ticker {
      position: relative;
      z-index: 1;
      margin-top: auto;
      flex-shrink: 0;
      border-top: 1px solid var(--line);
      padding: 1rem 0;
      overflow: hidden;
      white-space: nowrap;
    }
    .ticker-inner {
      display: inline-flex;
      align-items: center;
      gap: 2rem;
      opacity: 0;
      animation: tickerScroll 22s linear infinite, fadeIn 0.6s ease 2.8s forwards;
    }
    .ticker-item {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.05rem;
      letter-spacing: 0.15em;
      color: rgba(240,235,227,0.45);
    }
    .ticker-dot {
      width: 5px; height: 5px;
      background: var(--accent);
      border-radius: 50%;
      flex-shrink: 0;
    }

    @keyframes tickerScroll {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    @media (max-width: 768px) {
      nav { padding: 1.5rem; }
      nav::after { left: 1.5rem; right: 1.5rem; }
      .nav-links { gap: 1.5rem; }
      .nav-links a { font-size: 0.65rem; }

    @media (max-width: 500px) {

  <script>
    // Canvas cursor — history buffer trail, crisp dot
    (function() {
      const HISTORY      = 112;   // number of past positions stored
      const DOT_RADIUS   = 8.8;
      const LINE_WIDTH   = 10;

      const canvas = document.createElement('canvas');
      canvas.id = 'cursorCanvas';
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
      document.body.appendChild(canvas);
      const ctx = canvas.getContext('2d', { alpha: true });

      window.addEventListener('resize', () => {
        canvas.width  = window.innerWidth;
        canvas.height = window.innerHeight;
      });

      const cursor = { x: -200, y: -200 };
      const history = [];
      let initted = false;

      document.addEventListener('mousemove', e => {
        cursor.x = e.clientX;
        cursor.y = e.clientY;
        if (!initted) {
          for (let i = 0; i < HISTORY; i++) history.push({ x: cursor.x, y: cursor.y });
          initted = true;
        }
      });

      function loop() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (!initted) { requestAnimationFrame(loop); return; }

        // Prepend current position, drop oldest
        history.unshift({ x: cursor.x, y: cursor.y });
        if (history.length > HISTORY) history.pop();

        // Draw trail as segments with fading opacity
        const SEGMENT = 4;
        const JITTER  = 1.6;
        for (let i = 0; i < history.length - SEGMENT; i += SEGMENT) {
          const t     = i / history.length;
          const alpha = 0.85 * Math.pow(1 - t, 2.5);
          const j     = JITTER * (1 - t * 0.4);
          ctx.beginPath();
          ctx.moveTo(
            history[i].x + (Math.random() - 0.5) * j,
            history[i].y + (Math.random() - 0.5) * j
          );
          for (let k = 1; k <= SEGMENT; k++) {
            const idx = Math.min(i + k, history.length - 1);
            ctx.lineTo(
              history[idx].x + (Math.random() - 0.5) * j,
              history[idx].y + (Math.random() - 0.5) * j
            );
          }
          ctx.lineWidth   = LINE_WIDTH;
          ctx.lineCap     = 'round';
          ctx.lineJoin    = 'round';
          ctx.strokeStyle = 'rgba(255,255,255,' + alpha + ')';
          ctx.stroke();
        }

        // Solid cursor dot
        ctx.save();
        ctx.globalCompositeOperation = 'source-over';
        ctx.beginPath();
        ctx.arc(cursor.x, cursor.y, 6, 0, Math.PI * 2);
        ctx.fillStyle = '#0f0f0f';
        ctx.fill();
        ctx.restore();

        requestAnimationFrame(loop);
      }

      loop();
    })();
  </script>

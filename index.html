<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Harry Frostick — Motion | Design | Illustration</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Bebas+Neue&family=Manrope:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --fg:        #f0ebe3;
      --accent:    #e8d5b0;
      --pink:      #f5e0e0;
      --muted:     #6b6560;
      --line:      rgba(240,235,227,0.12);
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      background: #0a0a0a;
      color: var(--fg);
      font-family: 'Manrope', sans-serif;
      font-weight: 300;
      cursor: none;
      display: flex;
      flex-direction: column;
    }

    /* Grain */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9990;
      opacity: 0.55;
    }

    /* Cursor */
    .cursor {
      position: fixed;
      width: 10px; height: 10px;
      background: var(--fg);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: width 0.3s ease, height 0.3s ease;
      mix-blend-mode: difference;
    }
    .cursor-ring {
      position: fixed;
      width: 36px; height: 36px;
      border: 1px solid rgba(240,235,227,0.4);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9998;
      transform: translate(-50%, -50%);
      transition: width 0.3s ease, height 0.3s ease, border-color 0.3s ease;
    }

    /* Nav */
    nav {
      position: fixed;
      z-index: 100;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 2rem 3rem;
    }
    nav::after {
      content: '';
      position: absolute;
      bottom: 0; left: 3rem; right: 3rem;
      height: 1px;
      background: rgba(240,235,227,0.15);
    }
    .nav-logo {
      display: flex;
      align-items: center;
      text-decoration: none;
      opacity: 0.9;
      transition: opacity 0.3s;
    }
    .nav-logo:hover { opacity: 1; }
    .nav-logo img {
      height: 28px;
      width: auto;
      filter: invert(1) brightness(2);
      mix-blend-mode: difference;
    }
    .nav-links {
      display: flex;
      gap: 2.5rem;
      list-style: none;
    }
    .nav-links a {
      color: var(--fg);
      text-decoration: none;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      opacity: 0.75;
      transition: color 0.3s, opacity 0.3s;
      mix-blend-mode: difference;
    }
    .nav-links a:hover { color: var(--pink); opacity: 1; }



    /* Ticker */
    .ticker {
      position: relative;
      z-index: 1;
      margin-top: auto;
      flex-shrink: 0;
      border-top: 1px solid var(--line);
      padding: 1rem 0;
      overflow: hidden;
      white-space: nowrap;
    }
    .ticker-inner {
      display: inline-flex;
      align-items: center;
      gap: 2rem;
      opacity: 0;
      animation: tickerScroll 22s linear infinite, fadeIn 0.6s ease 2.8s forwards;
    }
    .ticker-item {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.05rem;
      letter-spacing: 0.15em;
      color: rgba(240,235,227,0.45);
    }
    .ticker-dot {
      width: 5px; height: 5px;
      background: var(--accent);
      border-radius: 50%;
      flex-shrink: 0;
    }

    @keyframes tickerScroll {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    @media (max-width: 768px) {
      nav { padding: 1.5rem; }
      nav::after { left: 1.5rem; right: 1.5rem; }
      .nav-links { gap: 1.5rem; }
      .nav-links a { font-size: 0.65rem; }
    }
    @media (max-width: 500px) {
      .nav-links { display: none; }
    }

    /* Background video */
    .bg-video-link {
      position: fixed;
      inset: 0;
      z-index: -1;
      display: block;
    }
    .bg-video {
      position: fixed;
      inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      z-index: -1;
      pointer-events: none;
    }
    /* Top gradient — flush with nav bar */
    nav::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 80px;
      background: linear-gradient(to bottom, rgba(28,3,21,0.35) 0%, transparent 100%);
      z-index: -1;
      pointer-events: none;
    }
    /* Bottom gradient — matches top */
    .ticker::before {
      content: '';
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 80px;
      background: linear-gradient(to top, rgba(28,3,21,0.35) 0%, transparent 100%);
      z-index: -1;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <div class="cursor" id="cursor"></div>
  <div class="cursor-ring" id="cursorRing"></div>

  <a href="portfolio.html" class="bg-video-link">
    <video class="bg-video" autoplay loop muted playsinline>
      <source src="showreel.mp4" type="video/mp4">
    </video>
  </a>

  <nav>
    <a href="index.html" class="nav-logo">
      <img src="HF.svg" alt="HF" />
    </a>
    <ul class="nav-links">
      <li><a href="about.html">About</a></li>
      <li><a href="portfolio.html">Work</a></li>
      <li><a href="https://www.instagram.com/harryfrostickdesigns" target="_blank" rel="noopener">Instagram</a></li>
      <li><a href="contact.html">Get in touch</a></li>
    </ul>
  </nav>

  <div class="ticker">
    <div class="ticker-inner">
      <span class="ticker-item">Motion Design</span><span class="ticker-dot"></span>
      <span class="ticker-item">After Effects</span><span class="ticker-dot"></span>
      <span class="ticker-item">Brand Animation</span><span class="ticker-dot"></span>
      <span class="ticker-item">Illustration</span><span class="ticker-dot"></span>
      <span class="ticker-item">Social Content</span><span class="ticker-dot"></span>
      <span class="ticker-item">Visual Identity</span><span class="ticker-dot"></span>
      <span class="ticker-item">Character Design</span><span class="ticker-dot"></span>
      <span class="ticker-item">Frame-by-Frame</span><span class="ticker-dot"></span>
      <span class="ticker-item">Motion Design</span><span class="ticker-dot"></span>
      <span class="ticker-item">After Effects</span><span class="ticker-dot"></span>
      <span class="ticker-item">Brand Animation</span><span class="ticker-dot"></span>
      <span class="ticker-item">Illustration</span><span class="ticker-dot"></span>
      <span class="ticker-item">Social Content</span><span class="ticker-dot"></span>
      <span class="ticker-item">Visual Identity</span><span class="ticker-dot"></span>
      <span class="ticker-item">Character Design</span><span class="ticker-dot"></span>
      <span class="ticker-item">Frame-by-Frame</span><span class="ticker-dot"></span>
    </div>
  </div>

  <script>
    // Cursor
    const cursor = document.getElementById('cursor');
    const ring   = document.getElementById('cursorRing');
    let mouseX = 0, mouseY = 0, ringX = 0, ringY = 0;

    document.addEventListener('mousemove', e => {
      mouseX = e.clientX; mouseY = e.clientY;
      cursor.style.left = mouseX + 'px';
      cursor.style.top  = mouseY + 'px';
    });
    (function animateRing() {
      ringX += (mouseX - ringX) * 0.12;
      ringY += (mouseY - ringY) * 0.12;
      ring.style.left = ringX + 'px';
      ring.style.top  = ringY + 'px';
      requestAnimationFrame(animateRing);
    })();

    document.querySelectorAll('a, button').forEach(el => {
      el.addEventListener('mouseenter', () => {
        cursor.style.width = '20px'; cursor.style.height = '20px';
        ring.style.width = '60px';   ring.style.height = '60px';
        ring.style.borderColor = 'rgba(240,235,227,0.7)';
      });
      el.addEventListener('mouseleave', () => {
        cursor.style.width = '10px'; cursor.style.height = '10px';
        ring.style.width = '36px';   ring.style.height = '36px';
        ring.style.borderColor = 'rgba(240,235,227,0.4)';
      });
    });
  </script>

</body>
</html>

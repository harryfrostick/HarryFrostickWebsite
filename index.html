<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Harry Frostick — Motion | Design | Illustration</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --fg:        #f0ebe3;
      --accent:    #e54e77;
      --pink:      #f5e0e0;
      --muted:     #6b6560;
      --line:      rgba(240,235,227,0.12);
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      background: #0a0a0a;
      color: var(--fg);
      font-family: 'Montserrat', sans-serif;
      font-weight: 300;
      cursor: none;
      display: flex;
      flex-direction: column;
    }

    /* Grain */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9990;
      opacity: 0.45;
    }


    /* Nav */
    nav {
      position: fixed;
      z-index: 100;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 2rem 3rem;
    }
    nav::before {
      content: '';
      position: absolute;
      inset: 0;
      height: 120px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.25) 0%, transparent 100%);
      pointer-events: none;
      z-index: -1;
    }

    .nav-links {
      display: flex;
      gap: 2.5rem;
      list-style: none;
    }
    .nav-links a {
      color: var(--fg);
      text-decoration: none;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      opacity: 0.5;
      transition: opacity 0.3s;
      mix-blend-mode: difference;
    }
    .nav-links a:hover { opacity: 1; }



    /* Ticker */
    .ticker {
      position: relative;
      z-index: 1;
      margin-top: auto;
      flex-shrink: 0;
      border-top: 1px solid var(--line);
      padding: 1rem 0;
      overflow: hidden;
      white-space: nowrap;
    }
    .ticker-inner {
      display: inline-flex;
      align-items: center;
      gap: 2rem;
      opacity: 0;
      animation: tickerScroll 22s linear infinite, fadeIn 0.6s ease 2.8s forwards;
    }
    .ticker-item {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.05rem;
      letter-spacing: 0.15em;
      color: rgba(240,235,227,0.45);
    }
    .ticker-dot {
      width: 5px; height: 5px;
      background: var(--accent);
      border-radius: 50%;
      flex-shrink: 0;
    }

    @keyframes tickerScroll {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    @media (max-width: 768px) {
      nav { padding: 1.5rem; }
      nav::after { left: 1.5rem; right: 1.5rem; }
      .nav-links { gap: 1.5rem; }
      .nav-links a { font-size: 0.65rem; }
    }
    @media (max-width: 500px) {
      .nav-links { display: none; }
    }

    /* Background video */
    .bg-video-link {
      position: fixed;
      inset: 0;
      z-index: -1;
      display: block;
    }
    .bg-video {
      position: fixed;
      inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      z-index: -1;
      pointer-events: none;
    }
    /* Nav logo */
    .nav-logo { display: flex; align-items: center; text-decoration: none; opacity: 0.9; transition: opacity 0.3s; }
    .nav-logo:hover { opacity: 1; }
    .nav-logo-lottie { width: 41px; height: 55px; display: block; mix-blend-mode: difference; }

    .cursor { position: fixed; width: 8.8px; height: 8.8px; background: #ffffff; border-radius: 50%; pointer-events: none; z-index: 9999; transform: translate(-50%,-50%); mix-blend-mode: multiply; }
    .cursor-echo { position: fixed; border-radius: 50%; pointer-events: none; z-index: 9998; transform: translate(-50%,-50%); }
    .nav-links a span { display: inline-block; transition: transform 0.1s linear; pointer-events: none; }
  </style>
</head>
<body>


  <a href="portfolio.html" class="bg-video-link">
    <video class="bg-video" autoplay loop muted playsinline>
      <source src="showreel.mp4" type="video/mp4">
    </video>
  </a>

  <div class="cursor" id="cursor"></div>
  <nav>
        <a href="index.html" class="nav-logo" id="navLogo">
      <div class="nav-logo-lottie" id="navLottie"></div>
    </a>
    <ul class="nav-links">
      <li><a href="about.html">About</a></li>
      <li><a href="portfolio.html">Work</a></li>
      <li><a href="https://www.instagram.com/harryfrostickdesigns" target="_blank" rel="noopener">Instagram</a></li>
      <li><a href="contact.html">Get in touch</a></li>
    </ul>
  </nav>

  <div class="ticker">
    <div class="ticker-inner">
      <span class="ticker-item">Motion Design</span><span class="ticker-dot"></span>
      <span class="ticker-item">After Effects</span><span class="ticker-dot"></span>
      <span class="ticker-item">Brand Animation</span><span class="ticker-dot"></span>
      <span class="ticker-item">Illustration</span><span class="ticker-dot"></span>
      <span class="ticker-item">Social Content</span><span class="ticker-dot"></span>
      <span class="ticker-item">Visual Identity</span><span class="ticker-dot"></span>
      <span class="ticker-item">Character Design</span><span class="ticker-dot"></span>
      <span class="ticker-item">Frame-by-Frame</span><span class="ticker-dot"></span>
      <span class="ticker-item">Motion Design</span><span class="ticker-dot"></span>
      <span class="ticker-item">After Effects</span><span class="ticker-dot"></span>
      <span class="ticker-item">Brand Animation</span><span class="ticker-dot"></span>
      <span class="ticker-item">Illustration</span><span class="ticker-dot"></span>
      <span class="ticker-item">Social Content</span><span class="ticker-dot"></span>
      <span class="ticker-item">Visual Identity</span><span class="ticker-dot"></span>
      <span class="ticker-item">Character Design</span><span class="ticker-dot"></span>
      <span class="ticker-item">Frame-by-Frame</span><span class="ticker-dot"></span>
    </div>
  </div>

  <script>
    const cursor = document.getElementById('cursor');

    const TRAIL_COUNT = 90;
    const echoes = [];
    for (let i = 0; i < TRAIL_COUNT; i++) {
      const el = document.createElement('div');
      el.className = 'cursor-echo';
      document.body.appendChild(el);
      echoes.push({ el, x: 0, y: 0 });
    }

    let mouseX = 0, mouseY = 0;
    let prevX = 0, prevY = 0;
    let speed = 0;

    document.addEventListener('mousemove', e => {
      mouseX = e.clientX;
      mouseY = e.clientY;
      cursor.style.left = mouseX + 'px';
      cursor.style.top  = mouseY + 'px';
    });

    (function tick() {
      const dx = mouseX - prevX;
      const dy = mouseY - prevY;
      speed = Math.sqrt(dx * dx + dy * dy);
      prevX = mouseX;
      prevY = mouseY;

      const activeCount = Math.min(TRAIL_COUNT, Math.max(1, Math.floor(speed * 3.0)));

      for (let i = 0; i < TRAIL_COUNT; i++) {
        const echo = echoes[i];
        const lag = (i + 1) * 0.007;
        echo.x += (mouseX - echo.x) * (1 - lag);
        echo.y += (mouseY - echo.y) * (1 - lag);

        if (i < activeCount) {
          const t = i / (activeCount - 1 || 1);
          const size = 8.8 * (1 - t * 0.1);
          const opacity = 0.55 * (1 - t);

          echo.el.style.display = 'block';
          echo.el.style.width  = size + 'px';
          echo.el.style.height = size + 'px';
          echo.el.style.left   = echo.x + 'px';
          echo.el.style.top    = echo.y + 'px';
          echo.el.style.opacity = opacity;
          echo.el.style.background = '#ffffff';
        } else {
          echo.el.style.display = 'none';
        }
      }

      requestAnimationFrame(tick);
    })();

    // Nav magnetic float + cursor scale
    (function() {
      const navLinks = document.querySelectorAll('.nav-links a');

      const animateit = function(e) {
        const span = this.querySelector('span');
        if (!span) return;
        const { offsetX: x, offsetY: y } = e,
              { offsetWidth: w, offsetHeight: h } = this,
              move = 4,
              xMove = x / w * (move * 2) - move,
              yMove = y / h * (move * 2) - move;
        span.style.transform = 'translate(' + xMove + 'px, ' + yMove + 'px)';
        if (e.type === 'mouseleave') span.style.transform = '';
      };

      navLinks.forEach(a => {
        // Wrap text in span if not already
        if (!a.querySelector('span')) {
          a.innerHTML = '<span>' + a.innerHTML + '</span>';
        }
        a.addEventListener('mousemove', animateit);
        a.addEventListener('mouseleave', animateit);
        a.addEventListener('mouseenter', () => {
          cursor.style.transform = 'translate(-50%,-50%) scale(4.5)';
          cursor.style.mixBlendMode = 'difference';
          cursor.style.transition = 'transform 0.3s ease';
        });
        a.addEventListener('mouseleave', () => {
          cursor.style.transform = 'translate(-50%,-50%) scale(1)';
          cursor.style.mixBlendMode = 'multiply';
          cursor.style.transition = 'transform 0.3s ease';
        });
      });
    })();
  </script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.12.2/lottie.min.js"></script>
  <script>
    // Nav link hover — scale cursor with difference blend
    const navLinks = document.querySelectorAll('.nav-links a');
    navLinks.forEach(link => {
      link.addEventListener('mouseenter', () => {
        cursor.style.transform = 'translate(-50%,-50%) scale(4.5)';
        cursor.style.mixBlendMode = 'difference';
        cursor.style.transition = 'transform 0.3s ease, mix-blend-mode 0s';
      });
      link.addEventListener('mouseleave', () => {
        cursor.style.transform = 'translate(-50%,-50%) scale(1)';
        cursor.style.mixBlendMode = 'multiply';
        cursor.style.transition = 'transform 0.3s ease';
      });
    });
    (function() {
      var logo = document.getElementById('navLogo');
      var container = document.getElementById('navLottie');
      var anim = lottie.loadAnimation({
        container: container,
        renderer: 'svg',
        loop: true,
        autoplay: false,
        path: 'HF_Ident.json'
      });
      anim.addEventListener('DOMLoaded', function() {
        anim.goToAndStop(0, true);
      });
      logo.addEventListener('mouseenter', function() {
        anim.goToAndPlay(0, true);
      });
      logo.addEventListener('mouseleave', function() {
        anim.goToAndStop(0, true);
      });
    })();
  </script>
</body>
</html>
